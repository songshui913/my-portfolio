<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系 - Brooke</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-container">
                <a href="index.html" class="nav-logo">Brooke</a>
                <ul class="nav-menu">
                    <li><a href="index.html" class="nav-link">首页</a></li>
                    <li><a href="projects.html" class="nav-link">项目</a></li>
                    <li><a href="contact.html" class="nav-link active">联系</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="container">
        <section class="contact">
            <h1>联系我</h1>
            
            <form class="contact-form" onclick="handleSubmit(event)">
                <div class="form-group">
                    <label for="name">姓名</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="email">邮箱</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="message">留言</label>
                    <textarea id="message" name="message" rows="6" required></textarea>
                </div>

                <button type="submit" class="submit-btn">发送</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Brooke. 保留所有权利。</p>
    </footer>

    <script>
        function handleSubmit(event) {
            event.preventDefault();
            alert('感谢您的留言！我会尽快回复您。');
            event.target.reset();
        }
    </script>
</body>
</html>
